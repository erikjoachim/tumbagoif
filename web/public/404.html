<!doctype html>
<html lang="sv">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>404 — Tumba Gymnastik och IF</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #0a0a0a;
        color: #fff;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .container { text-align: center; }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        padding: 12px 24px;
        background: #141414;
        border: 1px solid #262626;
        border-radius: 100px;
        font-size: 0.875rem;
        color: #a3a3a3;
        margin-bottom: 32px;
      }
      .pulse {
        width: 8px;
        height: 8px;
        background: #dc2626;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50% { opacity: 0.5; transform: scale(1.2); }
      }
      h1 {
        font-size: clamp(2.5rem, 8vw, 5rem);
        margin-bottom: 24px;
      }
      .highlight {
        background: linear-gradient(135deg, #dc2626, #f87171);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      p {
        font-size: clamp(1rem, 2vw, 1.25rem);
        color: #a3a3a3;
        margin-bottom: 40px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        padding: 16px 32px;
        background: #dc2626;
        color: #fff;
        font-weight: 600;
        font-size: 1rem;
        border-radius: 12px;
        text-decoration: none;
        transition: all 0.3s ease;
      }
      .btn:hover {
        background: #b91c1c;
        transform: translateY(-2px);
        box-shadow: 0 8px 16px rgba(220, 38, 38, 0.3);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="badge"><span class="pulse"></span>Tumba Gymnastik och Idrottsförening</div>
      <h1>404 — <span class="highlight">Sidan hittades inte</span></h1>
      <p>Sidan du sökte finns inte på denna webbplats.</p>
      <a href="/" class="btn">Till startsidan</a>
    </div>
  </body>
</html>
